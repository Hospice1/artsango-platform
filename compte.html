<!DOCTYPE html>

<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte - ArtSango</title>
<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#8c5a2b,#c68642);
font-family:Arial;
}

.signup-container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:350px;
text-align:center;
}

.signup-container input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:5px;
}

.signup-container button{
width:100%;
padding:10px;
background:#8c5a2b;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="signup-container">

<h2>Créer un compte artisan</h2>

<input type="text" placeholder="Nom complet">

<input type="email" placeholder="Email">

<input type="password" placeholder="Mot de passe">

<input type="tel" placeholder="Téléphone">

<button>Créer mon compte</button>

<br><br>

<a href="connexion.html">Déjà un compte ? Se connecter</a>

</div>

</body>

</html>
