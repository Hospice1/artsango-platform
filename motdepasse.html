<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mot de passe oublié - ArtSango</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#8c5a2b,#c68642);
font-family:Arial;
}

.reset-container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:350px;
text-align:center;
}

.reset-container input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:5px;
}

.reset-container button{
width:100%;
padding:10px;
background:#8c5a2b;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="reset-container">

<h2>Mot de passe oublié</h2>

<p>Entrez votre email pour recevoir un lien de réinitialisation.</p>

<input type="email" placeholder="Votre email">

<button>Envoyer le lien</button>

<br><br>

<a href="connexion.html">Retour à la connexion</a>

</div>

</body>

</html>
